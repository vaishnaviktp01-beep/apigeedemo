name: Deploy Apigee API Proxy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Apigee eval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          export_environment_variables: true
          cleanup_credentials: false

      - name: Generate OAuth2 Token
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "APIGEE_BEARER_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Build Apigee proxy
        run: |
          mvn clean package -P eval -ntp
          ls -la target/  # Debug: List all artifacts created
    
      - name: Deploy to Apigee eval
        run: |
        # Find the actual ZIP file created
           ZIP_FILE=$(find target -name "*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
          echo "ERROR: No ZIP file found in target directory"
          exit 1
          fi

          mvn apigee-enterprise:deploy -P eval -ntp \
          -Dapigee.org=${{ secrets.APIGEE_ORG }} \
          -Dapigee.env=eval \
          -Dapigee.bearer=${{ env.APIGEE_BEARER_TOKEN }}
            

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigee-proxy-bundle
          path: target/*.zip
          retention-days: 10
